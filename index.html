<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesPro KZ - Магазин</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #00A651 0%, #0099CC 100%); }
        .kazakh-pattern { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300A651' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(0,166,81,.3); border-radius: 50%; border-top-color: #00A651; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .lang-btn.active { background: linear-gradient(135deg, #00A651 0%, #0099CC 100%); color: white; transform: scale(1.05); }
        .lang-btn:not(.active):hover { background-color: #f3f4f6; }
        .sidebar-item { transition: all 0.3s ease; }
        .sidebar-item:hover { transform: translateX(5px); }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: scale(1.02); }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 kazakh-pattern">

    <!-- Language Switcher -->
    <div class="fixed top-4 right-4 z-50 flex gap-2 bg-white rounded-xl shadow-lg p-1 border border-gray-200">
        <button onclick="switchLanguage('ru')" id="btn-ru" class="lang-btn active px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
            <span class="text-lg">🇷🇺</span><span>RU</span>
        </button>
        <button onclick="switchLanguage('kk')" id="btn-kk" class="lang-btn px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 text-gray-600">
            <span class="text-lg">🇰🇿</span><span>KZ</span>
        </button>
    </div>

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-slate-900 text-white z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300" id="sidebar">
        <div class="p-6 border-b border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-store text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl">SalesPro</h1>
                    <p class="text-xs text-slate-400">KZ Shop</p>
                </div>
            </div>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="showSection('dashboard')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-600 text-white">
                <i class="fas fa-home w-5"></i><span>Главная</span>
            </button>
            <button onclick="showSection('products')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-300">
                <i class="fas fa-box w-5"></i><span>Товары</span>
            </button>
            <button onclick="showSection('sales')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-300">
                <i class="fas fa-shopping-cart w-5"></i><span>Продажи</span>
                <span class="ml-auto bg-red-500 text-xs px-2 py-1 rounded-full" id="cart-count">0</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="md:ml-64 min-h-screen">
        <header class="bg-white sticky top-0 z-30 border-b border-gray-200 px-6 py-4 mt-16 md:mt-0">
            <div class="flex items-center justify-between">
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-100 rounded-lg"><i class="fas fa-bars text-xl"></i></button>
                <div class="flex-1 max-w-2xl mx-4">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-input" placeholder="Поиск..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-emerald-500">
                    </div>
                </div>
            </div>
        </header>

        <!-- Products Section -->
        <section id="products-section" class="p-6 animate-fade-in">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Каталог товаров</h2>
                    <p class="text-gray-500">Все товары из Google Sheets</p>
                </div>
                <a href="https://docs.google.com/spreadsheets/d/1280bGzTHy0fOIDBvyEft0bM4p5fklbc7shg6MzviVKs/edit" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl flex items-center gap-2">
                    <i class="fas fa-plus"></i> Добавить товар
                </a>
            </div>

            <!-- Filters -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6 flex flex-wrap gap-4 items-center">
                <div class="flex gap-2 flex-wrap">
                    <button onclick="filterProducts('all')" class="filter-btn active px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium">Все</button>
                    <button onclick="filterProducts('electronics')" class="filter-btn px-4 py-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium">Электроника</button>
                    <button onclick="filterProducts('food')" class="filter-btn px-4 py-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium">Продукты</button>
                    <button onclick="filterProducts('meat')" class="filter-btn px-4 py-2 rounded-lg bg-red-100 text-red-600 hover:bg-red-200 text-sm font-medium">🥩 Мясо</button>
                    <button onclick="filterProducts('clothing')" class="filter-btn px-4 py-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-medium">Одежда</button>
                </div>
                <button onclick="loadProducts()" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-4 py-2 rounded-lg">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
            </div>

            <div id="loading" class="text-center py-8">
                <div class="loading mb-2"></div>
                <p class="text-gray-500">Загрузка...</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="products-grid"></div>
        </section>

        <!-- Sales Section -->
        <section id="sales-section" class="p-6 hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                    <h3 class="font-bold text-lg mb-4">Новая продажа</h3>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="sale-products-grid"></div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                    <h3 class="font-bold text-lg mb-4">Чек №<span id="receipt-number">001</span></h3>
                    <div id="cart-items" class="mb-4">
                        <div class="text-center text-gray-400 py-8">
                            <i class="fas fa-shopping-basket text-4xl mb-2"></i>
                            <p>Корзина пуста</p>
                        </div>
                    </div>
                    <div class="border-t pt-4">
                        <div class="flex justify-between mb-2"><span>Итого:</span><span class="font-bold text-emerald-600" id="total">₸0</span></div>
                        <button onclick="completeSale()" id="checkout-btn" disabled class="w-full gradient-bg disabled:bg-gray-300 text-white py-3 rounded-xl">Оформить</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const SHEET_ID = '1280bGzTHy0fOIDBvyEft0bM4p5fklbc7shg6MzviVKs';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
        
        let products = [];
        let cart = [];
        let currentFilter = 'all';
        let currentLang = 'ru';

        async function loadProducts() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                products = json.table.rows.slice(1).map((row, index) => ({
                    id: parseInt(row.c[0]?.v) || index + 1,
                    name: { ru: row.c[1]?.v || 'Без названия', kk: row.c[2]?.v || row.c[1]?.v || 'Атаусыз' },
                    price: parseInt(row.c[3]?.v) || 0,
                    category: row.c[4]?.v || 'electronics',
                    stock: parseInt(row.c[5]?.v) || 0,
                    image: row.c[6]?.v || 'https://via.placeholder.com/400'
                })).filter(p => p.id > 0 && p.name.ru);

                document.getElementById('loading').style.display = 'none';
                renderProducts();
                renderSaleProducts();
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('loading').innerHTML = '<p class="text-red-500">Ошибка загрузки. Проверьте Google Sheets.</p>';
            }
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            
            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden';
                card.innerHTML = `
                    <div class="relative h-48 overflow-hidden">
                        <img src="${product.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400'">
                        <span class="absolute top-3 right-3 px-2 py-1 bg-white rounded-lg text-xs font-medium">${getCategoryName(product.category)}</span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-gray-800 mb-1">${product.name[currentLang]}</h3>
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-2xl font-bold text-emerald-600">₸${product.price.toLocaleString()}</span>
                            <span class="text-sm text-gray-500">В наличии: ${product.stock}</span>
                        </div>
                        <button onclick="addToCart(${product.id})" class="w-full gradient-bg text-white py-2 rounded-xl">В корзину</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function getCategoryName(cat) {
            const names = { electronics: 'Электроника', food: 'Продукты', meat: '🥩 Мясо', clothing: 'Одежда', home: 'Для дома' };
            return names[cat] || cat;
        }

        function filterProducts(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'bg-red-600', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            });
            event.target.classList.remove('bg-gray-100', 'text-gray-600');
            event.target.classList.add(category === 'meat' ? 'bg-red-600' : 'bg-emerald-600', 'text-white');
            renderProducts();
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || product.stock <= 0) return alert('Нет в наличии!');
            
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                if (existing.quantity < product.stock) existing.quantity++;
                else return alert('Максимум!');
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            
            document.getElementById('cart-count').textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('total').textContent = '₸' + total.toLocaleString();
            document.getElementById('checkout-btn').disabled = cart.length === 0;

            if (cart.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8"><i class="fas fa-shopping-basket text-4xl mb-2"></i><p>Корзина пуста</p></div>';
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl mb-2">
                    <img src="${item.image}" class="w-12 h-12 object-cover rounded-lg">
                    <div class="flex-1">
                        <h4 class="font-medium text-sm">${item.name[currentLang]}</h4>
                        <p class="text-emerald-600 font-bold">₸${(item.price * item.quantity).toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateQty(${index}, -1)" class="w-6 h-6 rounded-full bg-gray-200">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQty(${index}, 1)" class="w-6 h-6 rounded-full bg-gray-200">+</button>
                        <button onclick="cart.splice(${index}, 1); updateCart();" class="text-red-400"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(index, change) {
            const item = cart[index];
            const product = products.find(p => p.id === item.id);
            if (change > 0 && item.quantity >= product.stock) return alert('Максимум!');
            item.quantity += change;
            if (item.quantity <= 0) cart.splice(index, 1);
            updateCart();
        }

        function completeSale() {
            if (cart.length === 0) return;
            alert('Продажа оформлена! Чек №' + document.getElementById('receipt-number').textContent);
            cart = [];
            updateCart();
            document.getElementById('receipt-number').textContent = String(parseInt(document.getElementById('receipt-number').textContent) + 1).padStart(3, '0');
        }

        function showSection(name) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(name + '-section').classList.remove('hidden');
            if (name === 'sales') renderSaleProducts();
        }

        function renderSaleProducts() {
            const grid = document.getElementById('sale-products-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white border rounded-xl p-3 cursor-pointer hover:border-emerald-500" onclick="addToCart(${p.id})">
                    <img src="${p.image}" class="w-full h-24 object-cover rounded-lg mb-2">
                    <h4 class="font-medium text-sm truncate">${p.name[currentLang]}</h4>
                    <p class="text-emerald-600 font-bold">₸${p.price.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            document.getElementById('btn-kk').classList.toggle('active', lang === 'kk');
            renderProducts();
            updateCart();
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>"Добавлена кнопка Мясо"
